name: Greetings

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      # WHY: greeting is best-effort; first-interaction is archived and its
      # repo-wide contribution check intermittently 500s on GitHub's side.
      - uses: actions/first-interaction@v1
        continue-on-error: true
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: >
            Thanks for opening your first issue on cfd-advisor! This is a
            local, single-user analysis tool, not an auto-trader — see
            SPEC.md for the full spec. Someone will take a look soon.
          pr-message: >
            Thanks for your first pull request to cfd-advisor! CI (lint +
            test) will run automatically — check the Checks tab for results.
