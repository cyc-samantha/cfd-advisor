name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      # setup-uv exports FORCE_COLOR=1 into the job env, which makes Typer's
      # Rich-based error rendering wrap/split flag names (e.g. "--open-positions")
      # across ANSI style codes, breaking plain-substring CLI assertions.
      FORCE_COLOR: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check

      - name: Test (pytest)
        run: uv run pytest
