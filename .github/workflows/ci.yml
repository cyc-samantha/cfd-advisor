name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      # typer's rich_utils force-enables terminal/color mode whenever the
      # GITHUB_ACTIONS env var is present, which wraps flag names (e.g.
      # "--open-positions") in ANSI style codes and breaks the CLI tests'
      # plain-substring assertions on error output.
      _TYPER_FORCE_DISABLE_TERMINAL: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check

      - name: Test (pytest)
        run: uv run pytest
